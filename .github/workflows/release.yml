name: Build Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-4-dev libadwaita-1-dev libsqlite3-dev libpoppler-glib-dev

      - name: Build binary
        run: make

      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk-x86_64.sh
          
          # Make plugin discoverable
          mv linuxdeploy-plugin-gtk-x86_64.sh linuxdeploy-plugin-gtk.sh
          export PATH="$PATH:."
          
          mkdir -p AppDir/usr/bin
          cp cuali-gtk AppDir/usr/bin/
          
          # Setup icon and desktop file for linuxdeploy
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          cp icons/hicolor/scalable/apps/org.cuali.CualiGTK.svg AppDir/usr/share/icons/hicolor/scalable/apps/
          mkdir -p AppDir/usr/share/applications
          cp org.cuali.CualiGTK.desktop AppDir/usr/share/applications/
          
          export DEPLOY_GTK_VERSION=4
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -d AppDir/usr/share/applications/org.cuali.CualiGTK.desktop \
            -i AppDir/usr/share/icons/hicolor/scalable/apps/org.cuali.CualiGTK.svg \
            --plugin gtk --output appimage
          
          # linuxdeploy might have named it differently, let's find it and rename it
          find . -name "Cuali*.AppImage" -exec mv {} Cuali-x86_64.AppImage \;

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Cuali-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-poppler
            make
            zip

      - name: Build
        shell: msys2 {0}
        run: |
          make
          mkdir -p dist
          cp cuali-gtk.exe dist/
          # Collect dependencies
          ldd cuali-gtk.exe | grep '/mingw64/bin/' | awk '{print $3}' | xargs -I{} cp {} dist/
          # Copy essential standard libraries
          cp /mingw64/bin/libwinpthread-1.dll dist/ 2>/dev/null || true
          cp /mingw64/bin/libgcc_s_seh-1.dll dist/ 2>/dev/null || true
          cp /mingw64/bin/libstdc++-6.dll dist/ 2>/dev/null || true
          
          # Copy icons and other assets
          mkdir -p dist/share/icons/hicolor/scalable/apps
          cp icons/hicolor/scalable/apps/org.cuali.CualiGTK.svg dist/share/icons/hicolor/scalable/apps/
          
          # Compile schemas
          mkdir -p dist/share/glib-2.0/schemas
          cp /mingw64/share/glib-2.0/schemas/*.xml dist/share/glib-2.0/schemas/ 2>/dev/null || true
          glib-compile-schemas dist/share/glib-2.0/schemas/

      - name: Create zip
        shell: msys2 {0}
        run: |
          zip -r Cuali-windows.zip dist/*

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Cuali-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install gtk4 libadwaita sqlite poppler pkg-config

      - name: Build
        run: |
          make
          mkdir -p Cuali.app/Contents/{MacOS,Resources}
          cp cuali-gtk Cuali.app/Contents/MacOS/
          cp icons/hicolor/scalable/apps/org.cuali.CualiGTK.svg Cuali.app/Contents/Resources/
          cat > Cuali.app/Contents/Info.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Cuali</string>
            <key>CFBundleDisplayName</key>
            <string>Cuali</string>
            <key>CFBundleIdentifier</key>
            <string>org.cuali.CualiGTK</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleExecutable</key>
            <string>cuali-gtk</string>
            <key>CFBundleIconFile</key>
            <string>org.cuali.CualiGTK</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          PLIST
          tar -czf Cuali-macos.tar.gz Cuali.app

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Cuali-macos.tar.gz
