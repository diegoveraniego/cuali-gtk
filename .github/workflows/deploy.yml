name: Build Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libadwaita-1-dev libpoppler-glib-dev libsqlite3-dev build-essential wget file

    - name: Build project
      run: |
        make -j$(nproc)

    - name: Prepare AppDir
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
        cp cuali-gtk AppDir/usr/bin/
        cp org.cuali.CualiGTK.desktop AppDir/usr/share/applications/
        cp assets/icon.svg AppDir/usr/share/icons/hicolor/scalable/apps/org.cuali.CualiGTK.svg || true

    - name: Setup linuxdeploy
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk.sh
        chmod +x linuxdeploy-plugin-gtk.sh

    - name: Build AppImage
      run: |
        export OUTPUT=Cuali-x86_64.AppImage
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin gtk -d AppDir/usr/share/applications/org.cuali.CualiGTK.desktop -i AppDir/usr/share/icons/hicolor/scalable/apps/org.cuali.CualiGTK.svg --output appimage
      env:
        UPD_INFO: "gh-releases-zsync|your-username|cuali-gtk|latest|*x86_64.AppImage.zsync"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cuali-AppImage
        path: Cuali-*.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: brew install gtk4 libadwaita sqlite poppler pkg-config

    - name: Build project
      run: make -j$(sysctl -n hw.ncpu)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cuali-macOS
        path: cuali-gtk

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-pkgconf
          mingw-w64-ucrt-x86_64-gtk4
          mingw-w64-ucrt-x86_64-libadwaita
          mingw-w64-ucrt-x86_64-sqlite3
          mingw-w64-ucrt-x86_64-poppler
          make

    - name: Build project
      shell: msys2 {0}
      run: make -j$NUMBER_OF_PROCESSORS

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cuali-Windows
        path: cuali-gtk.exe
