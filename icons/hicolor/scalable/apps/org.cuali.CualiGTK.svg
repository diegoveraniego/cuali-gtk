<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <title>Cuali</title>

  <!-- Fondo estilo GNOME -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="#3584e4"/>

  <!-- Etiqueta rotada -->
  <g transform="translate(132, 134) rotate(-20)">
    <!-- Cuerpo de la etiqueta -->
    <path d="M-44,-70 L44,-70 Q58,-70 58,-56 L58,44 Q58,58 44,70 L0,92 L-44,70 Q-58,58 -58,44 L-58,-56 Q-58,-70 -44,-70 Z"
          fill="#ffffff" opacity="0.97"/>

