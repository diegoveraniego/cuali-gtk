<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taguette</title>
    <style>
      :root {
        --window-bg: #ffffff;
        --window-fg: #2e3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --window-bg: #242424;
          --window-fg: #ffffff;
        }
      }
      body {
        background-color: var(--window-bg);
        color: var(--window-fg);
        font-family: "Cantarell", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(53, 132, 228, 0.2);
        border-top: 4px solid #3584e4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      h1 { margin-top: 20px; font-weight: 400; font-size: 1.2rem; }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <h1>Conectando con Taguette...</h1>
    <script type="module" src="/main.js"></script>
  </body>
</html>
